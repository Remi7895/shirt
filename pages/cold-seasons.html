<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fall & Winter — SHIRT</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231A2744'/><text x='32' y='46' font-family='Georgia,serif' font-size='38' font-weight='700' fill='white' text-anchor='middle'>S</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/season.css" />
</head>
<body>

  <header class="header">
    <nav class="nav">
      <a href="warm-seasons.html">Spring & Summer</a>
    </nav>
    <a href="../index.html" class="logo">SHIRT</a>
    <nav class="nav">
      <a href="cold-seasons.html" class="active">Fall & Winter</a>
    </nav>
  </header>

  <section class="page-hero">
    <div class="page-hero-bg" style="background-image: url('../assets/img/fall-banner.jpg')"></div>
    <div class="page-hero-content">
      <span class="season-eyebrow">Cold Seasons</span>
      <h1>Fall & Winter</h1>
    </div>
  </section>

  <main class="page-main">
    <div class="toolbar">
      <div class="outfit-count"><span id="outfit-count">0</span> outfits</div>
      <div class="toolbar-right">
        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="cool">Cool (5–15°C)</button>
          <button class="filter-btn" data-filter="cold">Cold (-5–5°C)</button>
          <button class="filter-btn" data-filter="freezing">Freezing (&lt;-5°C)</button>
        </div>
        <button class="btn-add" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Add outfit
        </button>
      </div>
    </div>

    <div class="outfit-grid" id="outfit-grid"></div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">New outfit</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="outfit-form">
        <div class="form-group">
          <label>Photo</label>
          <div class="img-upload" id="img-upload">
            <input type="file" id="img-input" accept="image/*" />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <span>Click to upload a photo</span>
            <img id="img-preview" style="display:none" />
          </div>
        </div>
        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" placeholder="e.g. Cozy winter layer" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Weather</label>
            <select name="weather">
              <option value="cool">Cool (5–15°C)</option>
              <option value="cold" selected>Cold (-5–5°C)</option>
              <option value="freezing">Freezing (&lt;-5°C)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tags</label>
            <input type="text" name="tags" placeholder="layered, wool, dark…" />
          </div>
        </div>
        <div class="form-group">
          <label>Pieces</label>
          <div class="pieces-input">
            <div id="pieces-list" class="pieces-list"></div>
            <div class="pieces-add-row">
              <input type="text" id="piece-input" placeholder="White jersey, blue jeans…" autocomplete="off" />
              <button type="button" id="piece-add-btn">+</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">Save outfit</button>
        </div>
      </form>
    </div>
  </div>

  <script>const SEASON_KEY = 'shirt_cold'; const SEASON_NAME = 'Fall & Winter';</script>
  <script src="../assets/js/season.js"></script>
</body>
</html>
